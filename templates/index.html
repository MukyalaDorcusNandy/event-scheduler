<!DOCTYPE html>
<html>
<head>
    <title>Quote Generator</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background-color: #f4f4f4;
            margin-top: 100px;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1> Quote Generator</h1>
        <p>{{ quote }}</p>
        <form method="get">
            <button type="submit">New Quote</button>
        </form>
    </div>
</body>
</html>
